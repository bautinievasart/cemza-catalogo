<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEMZA Automotores — Stock Disponible</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f14;
  --surface:#13171f;
  --surface2:#1a1f2a;
  --surface3:#222837;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --accent:#2563eb;
  --accent-light:#3b82f6;
  --accent-dim:rgba(37,99,235,0.15);
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#64748b;
  --ok:#22c55e;
  --wa:#25d366;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--r999:999px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}

/* NAV */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(12,15,20,0.85);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;
}
.nav-badge{font-size:11px;font-weight:600;background:var(--accent-dim);color:var(--accent-light);border:1px solid rgba(59,130,246,.3);padding:3px 10px;border-radius:var(--r999);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-count{font-size:12px;color:var(--text3);}

/* HERO */
.hero{
  background:linear-gradient(160deg,#0f172a 0%,#0c0f14 60%,#0a0d12 100%);
  padding:52px 20px 40px;text-align:center;position:relative;
}
.hero::before{
  content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:600px;height:300px;background:radial-gradient(ellipse,rgba(37,99,235,.18) 0%,transparent 70%);
  pointer-events:none;
}
.hero h1{font-size:clamp(26px,5vw,42px);font-weight:800;letter-spacing:-.8px;line-height:1.15;margin-bottom:12px;}
.hero h1 span{color:var(--accent-light);}
.hero p{font-size:15px;color:var(--text2);max-width:480px;margin:0 auto 28px;}
.hero-logo-wrap{display:flex;justify-content:center;align-items:center;margin-bottom:32px;}
.hero-logo{height:320px;max-width:90vw;object-fit:contain;display:block;}

/* FILTERS */
.filters{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r16);padding:16px;display:flex;flex-wrap:wrap;gap:10px;
  max-width:900px;margin:0 auto;
}
.filter-input{
  flex:1;min-width:140px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r8);padding:9px 14px;
  font-size:13px;font-family:inherit;color:var(--text);transition:border-color .15s;
}
.filter-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.filter-input::placeholder{color:var(--text3);}
.filter-input option{background:var(--surface2);}
.btn-reset{
  padding:9px 16px;border-radius:var(--r8);background:transparent;
  border:1px solid var(--border2);color:var(--text2);cursor:pointer;
  font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;white-space:nowrap;
}
.btn-reset:hover{background:var(--surface2);color:var(--text);}

/* MAIN CONTENT */
.content{max-width:1100px;margin:0 auto;padding:32px 16px 64px;}

/* STATS BAR */
.stats-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.stats-label{font-size:13px;color:var(--text3);}
.stats-label strong{color:var(--text);font-weight:600;}
.sort-select{background:var(--surface2);border:1px solid var(--border);color:var(--text2);
  font-size:12px;font-family:inherit;padding:6px 12px;border-radius:var(--r8);cursor:pointer;}
.sort-select:focus{outline:none;border-color:var(--accent);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;}

/* CARD */
.car-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r16);overflow:hidden;cursor:pointer;
  transition:transform .18s,border-color .18s,box-shadow .18s;
  display:flex;flex-direction:column;
}
.car-card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:0 8px 32px rgba(0,0,0,.4);}

.card-img{position:relative;height:192px;background:var(--surface2);overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.car-card:hover .card-img img{transform:scale(1.04);}
.card-img-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);}
.card-img-placeholder svg{width:40px;height:40px;opacity:.3;}
.card-img-placeholder span{font-size:12px;}

.card-photo-count{
  position:absolute;bottom:10px;right:10px;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
  color:white;font-size:10px;font-weight:600;
  padding:3px 8px;border-radius:var(--r999);display:flex;align-items:center;gap:4px;
}

.card-badge-pub{
  position:absolute;top:10px;left:10px;
  background:var(--accent);color:white;
  font-size:9px;font-weight:700;padding:3px 8px;
  border-radius:var(--r999);text-transform:uppercase;letter-spacing:.5px;
}

.card-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:12px;}

.card-title{font-size:16px;font-weight:700;line-height:1.2;letter-spacing:-.2px;}
.card-subtitle{font-size:12px;color:var(--text3);margin-top:2px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;}

.card-specs{display:flex;gap:8px;flex-wrap:wrap;}
.spec-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r999);padding:3px 10px;font-size:11px;font-weight:600;color:var(--text2);
}
.spec-pill svg{width:11px;height:11px;opacity:.7;flex-shrink:0;}
.badge-gnc{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.25);color:#4ade80;}

.card-price{
  margin-top:auto;padding-top:12px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.price-label{font-size:11px;color:var(--text3);font-weight:500;}
.price-value{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
.price-value.no-price{font-size:14px;color:var(--text3);font-weight:500;}

.card-wa{
  width:34px;height:34px;border-radius:50%;background:var(--wa);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .15s,box-shadow .15s;
}
.card-wa:hover{transform:scale(1.1);box-shadow:0 4px 12px rgba(37,211,102,.35);}
.card-wa svg{width:18px;height:18px;fill:white;}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3;}
.empty h3{font-size:18px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.empty p{font-size:14px;}

/* LOADING */
.loading{text-align:center;padding:80px 20px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r20);
  width:100%;max-width:780px;max-height:90vh;overflow-y:auto;
  transform:translateY(16px) scale(.98);transition:transform .2s;
}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}

/* Gallery */
.gallery{position:relative;background:var(--surface2);}
.gallery-main{height:300px;overflow:hidden;}
.gallery-main img{width:100%;height:100%;object-fit:cover;}
.gallery-main-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);}
.gallery-main-placeholder svg{width:60px;height:60px;opacity:.2;}

.gallery-thumbs{display:flex;gap:6px;padding:8px;overflow-x:auto;}
.gallery-thumbs::-webkit-scrollbar{height:3px;}
.gallery-thumbs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.gallery-thumb{
  width:68px;height:48px;flex-shrink:0;border-radius:6px;overflow:hidden;
  cursor:pointer;border:2px solid transparent;transition:border-color .15s;
}
.gallery-thumb.active{border-color:var(--accent);}
.gallery-thumb img{width:100%;height:100%;object-fit:cover;}

.gallery-arrows{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);display:flex;justify-content:space-between;padding:0 10px;pointer-events:none;}
.gallery-arrow{
  pointer-events:all;width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);border:1px solid var(--border2);
  color:white;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s;
}
.gallery-arrow:hover{background:rgba(0,0,0,.85);}
.gallery-arrow svg{width:16px;height:16px;}

.modal-body{padding:24px;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;}
.modal-title{font-size:22px;font-weight:800;letter-spacing:-.4px;line-height:1.2;}
.modal-subtitle{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-top:4px;}
.modal-close{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:var(--text2);}
.modal-close:hover{background:var(--surface3);color:var(--text);}
.modal-close svg{width:16px;height:16px;}

.modal-specs{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.spec-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r12);padding:12px 14px;}
.spec-card-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.spec-card-value{font-size:14px;font-weight:700;color:var(--text);}

.modal-caract{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r12);padding:14px;margin-bottom:20px;}
.modal-caract-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.modal-caract-text{font-size:13px;color:var(--text2);line-height:1.6;}

.modal-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-top:20px;border-top:1px solid var(--border);}
.modal-price-block{}
.modal-price-label{font-size:11px;color:var(--text3);margin-bottom:2px;}
.modal-price-value{font-size:28px;font-weight:800;letter-spacing:-1px;}

.btn-wa{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--wa);color:white;border:none;cursor:pointer;
  padding:12px 22px;border-radius:var(--r12);font-size:14px;font-weight:700;
  font-family:inherit;transition:all .15s;text-decoration:none;
}
.btn-wa:hover{background:#1fba58;transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,211,102,.3);}
.btn-wa svg{width:20px;height:20px;fill:white;flex-shrink:0;}

/* FOOTER */
footer{background:var(--surface);border-top:1px solid var(--border);padding:24px 20px;text-align:center;}
footer p{font-size:12px;color:var(--text3);}
footer strong{color:var(--text2);}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── MOBILE FIRST ─────────────────────────────────────── */
@media(max-width:480px){
  .nav{height:52px;padding:0 14px;}
  .nav-count{display:none;}
  .hero{padding:32px 16px 28px;}
  .hero-logo{height:200px;}
  .hero h1{font-size:24px;}
  .hero p{font-size:13px;margin-bottom:20px;}
  .filters{padding:12px;gap:8px;border-radius:12px;}
  .filter-input{min-width:100%;font-size:14px;}
  .btn-reset{width:100%;}
  .content{padding:16px 12px 48px;}
  .stats-bar{gap:6px;}
  .sort-select{font-size:12px;}
  .grid{grid-template-columns:1fr;gap:12px;}
  .car-card{}
  .card-img{height:200px;}
  .card-title{font-size:15px;}
  .price-value{font-size:18px;}
  /* Modal mobile */
  .modal-overlay{padding:0;align-items:flex-end;}
  .modal{border-radius:var(--r20) var(--r20) 0 0;max-height:92vh;}
  .gallery-main{height:220px;}
  .modal-body{padding:16px;}
  .modal-title{font-size:18px;}
  .modal-price-value{font-size:22px;}
  .modal-specs{grid-template-columns:1fr 1fr;gap:8px;}
  .spec-card{padding:10px 12px;}
  .modal-footer{flex-direction:column;align-items:stretch;}
  .btn-wa{justify-content:center;padding:14px;}
  .gallery-thumbs{padding:6px;}
  .gallery-thumb{width:56px;height:40px;}
}

@media(min-width:481px) and (max-width:768px){
  .nav{padding:0 20px;}
  .hero{padding:44px 24px 36px;}
  .hero-logo{height:220px;}
  .hero h1{font-size:28px;}
  .filters{gap:10px;}
  .filter-input{min-width:calc(50% - 5px);}
  .content{padding:20px 16px 48px;}
  .grid{grid-template-columns:1fr 1fr;gap:12px;}
  .card-img{height:190px;}
  /* Modal */
  .modal-overlay{padding:12px;}
  .gallery-main{height:280px;}
  .modal-footer{gap:12px;}
}

@media(min-width:640px){
  .nav{padding:0 32px;}
  .hero{padding:72px 32px 52px;}
  .gallery-main{height:400px;}
}
@media(min-width:900px){
  .gallery-main{height:460px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(290px,1fr));}
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyDCvpjfcF523jCEV7OvJmlkgk7VlLqxgmY",
  authDomain:"cemza-dms.firebaseapp.com",
  projectId:"cemza-dms",
  storageBucket:"cemza-dms.firebasestorage.app",
  messagingSenderId:"885199998144",
  appId:"1:885199998144:web:e1246a9b6825c0c3cdf125"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

window._stock = [];
window._currentAuto = null;
window._currentPhotoIdx = 0;

function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(n){ return Number(n||0).toLocaleString('es-AR'); }

// ── LISTENER ──────────────────────────────────────────────
onSnapshot(collection(db,'stock_publico'), snap => {
  window._stock = snap.docs.map(d => ({id:d.id,...d.data()}));
  renderCatalog();
  updateNavCount();
  buildFilters();
});

function updateNavCount(){
  const el = document.getElementById('nav-count');
  if(el) el.textContent = window._stock.length + ' unidades';
}

function buildFilters(){
  // Nada extra — filtros son inputs libres
}

// ── FILTER + SORT ──────────────────────────────────────────
function getFiltered(){
  const marca  = document.getElementById('f-marca')?.value.trim().toLowerCase()||'';
  const modelo = document.getElementById('f-modelo')?.value.trim().toLowerCase()||'';
  const anio   = document.getElementById('f-anio')?.value.trim()||'';
  let items = window._stock.filter(a => {
    if(marca  && !(a.marca||'').toLowerCase().includes(marca))   return false;
    if(modelo && !(a.modelo||'').toLowerCase().includes(modelo)) return false;
    if(anio   && String(a.anio) !== anio)                        return false;
    return true;
  });
  const sort = document.getElementById('sort-sel')?.value||'fecha';
  if(sort === 'precio-asc')  items.sort((a,b)=>(a.precioPub||0)-(b.precioPub||0));
  if(sort === 'precio-desc') items.sort((a,b)=>(b.precioPub||0)-(a.precioPub||0));
  if(sort === 'anio-desc')   items.sort((a,b)=>(b.anio||0)-(a.anio||0));
  if(sort === 'km-asc')      items.sort((a,b)=>(a.km||0)-(b.km||0));
  if(sort === 'fecha')       items.sort((a,b)=>(b.actualizadoEn||'').localeCompare(a.actualizadoEn||''));
  return items;
}

window.renderCatalog = function(){
  const items = getFiltered();
  const grid  = document.getElementById('catalog-grid');
  const label = document.getElementById('stats-label');
  if(label) label.innerHTML = `<strong>${items.length}</strong> vehículo${items.length!==1?'s':''} encontrado${items.length!==1?'s':''}`;

  if(!items.length){
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <h3>Sin resultados</h3>
      <p>Probá con otros filtros o volvé más tarde.</p>
    </div>`;
    return;
  }
  grid.innerHTML = '<div class="grid">' + items.map(a => cardHTML(a)).join('') + '</div>';
};

function cardHTML(a){
  const foto = (a.fotosURL && a.fotosURL.length) ? a.fotosURL[0] : null;
  const fotoCount = (a.fotosURL||[]).length;
  const waMsg = encodeURIComponent("Hola, consulto por el " + (a.marca||'') + " " + (a.modelo||'') + " año " + (a.anio||'') + " que vi en la web");
  return `<div class="car-card" onclick="openModal('${esc(a.id)}')">
    <div class="card-img">
      ${foto
        ? `<img src="${esc(foto)}" alt="${esc(a.marca)} ${esc(a.modelo)}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=card-img-placeholder><svg fill=none viewBox=\'0 0 24 24\' stroke=currentColor><path stroke-linecap=round stroke-linejoin=round stroke-width=1 d=\'M21 12a2.25 2.25 0 0 0-2.25-2.25H15a3 3 0 1 1-6 0H5.25A2.25 2.25 0 0 0 3 12m18 0v6a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 18v-6m18 0V9M3 12V9\'/></svg><span>Sin foto</span></div>'">`
        : '<div class="card-img-placeholder"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M21 12a2.25 2.25 0 0 0-2.25-2.25H15a3 3 0 1 1-6 0H5.25A2.25 2.25 0 0 0 3 12m18 0v6a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 18v-6m18 0V9M3 12V9"/></svg><span>Sin foto</span></div>'}
      ${fotoCount > 1 ? `<div class="card-photo-count"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="10" height="10"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z"/></svg>${fotoCount} fotos</div>` : ''}
    </div>
    <div class="card-body">
      <div>
        <div class="card-title">${esc(a.marca)} ${esc(a.modelo)}</div>
        <div class="card-subtitle">${esc(a.dominio||'')} ${a.anio ? '· ' + a.anio : ''}</div>
      </div>
      <div class="card-specs">
        <div class="spec-pill">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 0 0-10.026 0 1.106 1.106 0 0 0-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"/></svg>
          ${fmt(a.km)} km
        </div>
        ${a.gnc ? '<div class="spec-pill badge-gnc">⛽ GNC</div>' : ''}
      </div>
      <div class="card-price">
        <div>
          <div class="price-label">Precio</div>
          ${a.precioPub ? `<div class="price-value">$${fmt(a.precioPub)}</div>` : '<div class="price-value no-price">Consultar</div>'}
        </div>
        <a class="card-wa" href="https://wa.me/5493571310397?text=${waMsg}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        </a>
      </div>
    </div>
  </div>`;
}

// ── MODAL ──────────────────────────────────────────────────
window.openModal = function(id){
  const a = window._stock.find(x=>x.id===id); if(!a) return;
  window._currentAuto = a;
  window._currentPhotoIdx = 0;
  renderGallery(a);
  renderModalBody(a);
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
};

window.closeModal = function(e){
  if(e && e.target !== document.getElementById('modal-overlay') && e.type!=='click') return;
  if(e && e.currentTarget === document.getElementById('modal-overlay') && e.target !== e.currentTarget) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
};

document.getElementById('modal-overlay').addEventListener('click', function(e){
  if(e.target === this){ closeModal(); }
});

window.changePhoto = function(dir){
  const a = window._currentAuto; if(!a || !a.fotosURL || !a.fotosURL.length) return;
  window._currentPhotoIdx = (window._currentPhotoIdx + dir + a.fotosURL.length) % a.fotosURL.length;
  renderGallery(a);
};

window.setPhoto = function(idx){
  window._currentPhotoIdx = idx;
  renderGallery(window._currentAuto);
};

function renderGallery(a){
  const fotos = a.fotosURL || [];
  const idx   = window._currentPhotoIdx;
  const g     = document.getElementById('modal-gallery');
  if(!fotos.length){
    g.innerHTML = `<div class="gallery-main"><div class="gallery-main-placeholder"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg></div></div>`;
    return;
  }
  const thumbs = fotos.map((url,i)=>`<div class="gallery-thumb ${i===idx?'active':''}" onclick="setPhoto(${i})"><img src="${esc(url)}" loading="lazy"></div>`).join('');
  const arrows = fotos.length > 1 ? `<div class="gallery-arrows">
    <button class="gallery-arrow" onclick="changePhoto(-1)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg></button>
    <button class="gallery-arrow" onclick="changePhoto(1)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg></button>
  </div>` : '';
  g.innerHTML = `<div class="gallery-main"><img src="${esc(fotos[idx])}" alt="${esc(a.marca)} ${esc(a.modelo)}"></div>
    ${arrows}
    ${fotos.length>1 ? `<div class="gallery-thumbs">${thumbs}</div>` : ''}`;
}

function renderModalBody(a){
  const waMsg = encodeURIComponent("Hola, consulto por el " + (a.marca||'') + " " + (a.modelo||'') + " año " + (a.anio||'') + " que vi en la web");
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">${esc(a.marca)} ${esc(a.modelo)}</div>

    </div>

      <div class="spec-card"><div class="spec-card-label">Kilómetros</div><div class="spec-card-value">${fmt(a.km)} km</div></div>
      <div class="spec-card"><div class="spec-card-label">Dominio</div><div class="spec-card-value">${esc(a.dominio||'—')}</div></div>
      <div class="spec-card"><div class="spec-card-label">GNC</div><div class="spec-card-value">${a.gnc ? '✓ Sí' : 'No'}</div></div>
    </div>
    ${a.caract ? `<div class="modal-caract"><div class="modal-caract-label">Descripción y equipamiento</div><div class="modal-caract-text">${esc(a.caract)}</div></div>` : ''}
    <div class="modal-footer">
      <div class="modal-price-block">
        <div class="modal-price-label">Precio público</div>
        <div class="modal-price-value">${a.precioPub ? '$' + fmt(a.precioPub) : 'Consultar'}</div>
      </div>
      <a class="btn-wa" href="https://wa.me/5493571310397?text=${waMsg}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        Consultar por WhatsApp
      </a>
    </div>`;
}

// ── FILTROS LIVE ──────────────────────────────────────────
['f-marca','f-modelo','f-anio'].forEach(id=>{
  document.getElementById(id)?.addEventListener('input', renderCatalog);
});

window.resetFilters = function(){
  ['f-marca','f-modelo','f-anio'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  renderCatalog();
};

// Cerrar modal con Escape
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>

<script>
function removeBg(img) {
  try {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = img.naturalWidth  || img.width  || 800;
    canvas.height = img.naturalHeight || img.height || 400;
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    const d = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    const out = ctx.createImageData(canvas.width, canvas.height);
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      out.data[i]   = r;
      out.data[i+1] = g;
      out.data[i+2] = b;
      // Negro/oscuro → transparente; el resto → opaco
      out.data[i+3] = (r < 50 && g < 50 && b < 50) ? 0 : 255;
    }
    ctx.putImageData(out, 0, 0);
    img.src = canvas.toDataURL('image/png');
  } catch(e) { /* fallo silencioso */ }
}
document.addEventListener('DOMContentLoaded', () => {
  const img = document.getElementById('hero-logo-img');
  if (!img) return;
  if (img.complete && img.naturalWidth) removeBg(img);
  else img.addEventListener('load', () => removeBg(img));
});
</script>
